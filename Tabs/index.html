<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <button class="nav-link btn btn-link">First Tab</button>
            </li>
            <li class="nav-item">
                <button class="nav-link btn btn-link">Second Tab</button>
            </li>
            <li class="nav-item">
                <button class="nav-link btn btn-link">Third Tab</button>
            </li>
            <li class="nav-item">
                <button class="nav-link btn btn-link">Fourth Tab</button>
            </li>
        </ul>
    </header>

    <main>
        <section>
            <p>Clicking each tab should hide the content of the other tab and show the content of the clicked tab. First
                tab enabled by default.</p>

            <div class="tabContent"></div>

            <p>Check content for each tab.</p>
        </section>
    </main>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- custom js -->
    <script src="script.js"></script>
</body>

</html>
