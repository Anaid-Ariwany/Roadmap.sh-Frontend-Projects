<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Textarea</title>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main>
        <h1>Restricted Textarea</h1>
        <p>Type something in the textarea below. The input will be restricted to a maximum of 250 characters.</p>
        <div class="divContainer">
            <textarea id="restricted-textarea" placeholder="Start typing..."></textarea>
            <p id="char-count"><em>0/250</em></p>
        </div>
    </main>

    <!-- custom js -->
    <script src="script.js"></script>
</body>

</html>
